<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Calculador</title>
</head>

<body>

  <h2>Calculador de Precio Final</h2>

  <input id="codigo" placeholder="Código">
  <input id="nombre" placeholder="Nombre">
  <input id="costo_base" type="number" placeholder="Costo">
  <input id="descuento" type="number" placeholder="Descuento">
  <input id="iva" type="number" placeholder="IVA">

  <button onclick="calcular()">Calcular</button>

  <div id="resultado"></div>

  <script>

    const API_URL = "https://backend-calculador-8c3l.onrender.com";

    function calcular() {

      fetch(API_URL + "/calcular/valorfinal", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          codigo: document.getElementById("codigo").value,
          nombre: document.getElementById("nombre").value,
          costo_base: Number(document.getElementById("costo_base").value),
          descuento: Number(document.getElementById("descuento").value),
          iva: Number(document.getElementById("iva").value)
        })
      })
      .then(r => r.json())
      .then(data => {

        document.getElementById("resultado").innerHTML =
          "<p>Total: " + data.valor_final + "</p>";

      })
      .catch(err => {
        console.log(err);
        document.getElementById("resultado").innerHTML = "Error conexión";
      });

    }

  </script>

</body>
</html>
