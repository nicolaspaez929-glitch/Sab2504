<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Calculador de Precio Final</title>
</head>

<body>

  <h2>Calculador de Precio Final</h2>

  <input id="codigo" placeholder="Código">
  <input id="nombre" placeholder="Nombre">
  <input id="costo_base" type="number" placeholder="Costo base">
  <input id="descuento" type="number" placeholder="Descuento %">
  <input id="iva" type="number" placeholder="IVA %">

  <button onclick="calcular()">Calcular</button>

  <div id="resultado"></div>

  <script>

    // 🔥 CAMBIA SOLO ESTA LÍNEA (TU BACKEND EN RENDER)
    const API_URL = "https://backend-calculador-8c3l.onrender.com";

    function calcular() {

      const codigo = document.getElementById("codigo").value;
      const nombre = document.getElementById("nombre").value;
      const costo = Number(document.getElementById("costo_base").value);
      const descuento = Number(document.getElementById("descuento").value);
      const iva = Number(document.getElementById("iva").value);

      // 🔴 VALIDACIÓN BÁSICA (EVITA 422)
      if (!codigo || !nombre || isNaN(costo) || isNaN(descuento) || isNaN(iva)) {
        document.getElementById("resultado").innerHTML = "⚠️ Completa todos los campos correctamente";
        return;
      }

      fetch(API_URL + "/calcular/valorfinal", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          codigo: codigo,
          nombre: nombre,
          costo_base: costo,
          descuento: descuento,
          iva: iva
        })
      })
        .then(res => res.json())
        .then(data => {

          console.log(data);

          document.getElementById("resultado").innerHTML = `
            <p><b>Valor base:</b> ${data.valor_base}</p>
            <p><b>Descuento:</b> ${data.descuento_aplicado}%</p>
            <p><b>IVA:</b> ${data.iva_aplicado}%</p>
            <h3><b>Total:</b> ${data.valor_final}</h3>
          `;
        })
        .catch(error => {
          console.error(error);
          document.getElementById("resultado").innerHTML = "❌ Error de conexión con el backend";
        });

    }

  </script>

</body>
</html>
