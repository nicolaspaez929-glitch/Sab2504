<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculador de Precio Final</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0f14;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background: #1c2030;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00e5a0;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin-top: 15px;
      background: #15181f;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Calculador de Precio Final</h2>

  <input id="codigo" placeholder="Código producto">
  <input id="nombre" placeholder="Nombre producto">
  <input id="costo_base" type="number" placeholder="Costo base">
  <input id="descuento" type="number" placeholder="Descuento %">
  <input id="iva" type="number" placeholder="IVA %">

  <button onclick="calcular()">Calcular</button>

  <div class="result" id="resultado"></div>
</div>

<script>

  // 🔥 TU BACKEND REAL EN RENDER
  const API_URL = "https://backend-calculador-8c3l.onrender.com";

  function calcular() {

    // 🔴 TOMAR VALORES
    const codigo = document.getElementById("codigo").value.trim();
    const nombre = document.getElementById("nombre").value.trim();
    const costo_base = parseFloat(document.getElementById("costo_base").value);
    const descuento = parseFloat(document.getElementById("descuento").value);
    const iva = parseFloat(document.getElementById("iva").value);

    // ⚠️ VALIDACIÓN (EVITA 422)
    if (!codigo || !nombre || isNaN(costo_base) || isNaN(descuento) || isNaN(iva)) {
      document.getElementById("resultado").innerHTML =
        "⚠️ Por favor completa todos los campos correctamente";
      return;
    }

    // 📦 PAYLOAD CORRECTO
    const data = {
      codigo,
      nombre,
      costo_base,
      descuento,
      iva
    };

    console.log("ENVIANDO:", data);

    // 🚀 FETCH AL BACKEND
    fetch(`${API_URL}/calcular/valorfinal`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(data)
    })
    .then(res => res.json())
    .then(response => {

      console.log("RESPUESTA:", response);

      document.getElementById("resultado").innerHTML = `
        <h3>${response.titulo}</h3>
        <p><b>Valor base:</b> ${response.valor_base}</p>
        <p><b>Descuento:</b> ${response.descuento_aplicado}%</p>
        <p><b>IVA:</b> ${response.iva_aplicado}%</p>
        <h3><b>Total:</b> ${response.valor_final}</h3>
      `;
    })
    .catch(error => {
      console.error(error);
      document.getElementById("resultado").innerHTML =
        "❌ Error conectando con el backend";
    });

  }

</script>

</body>
</html>
