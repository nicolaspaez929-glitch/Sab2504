<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Calculador de Precio Final</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d0f14;
      color: white;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .container {
      background: #1c2030;
      padding: 20px;
      border-radius: 10px;
      width: 400px;
    }

    input {
      width: 100%;
      padding: 10px;
      margin: 8px 0;
      border-radius: 5px;
      border: none;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #00e5a0;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .result {
      margin-top: 15px;
      background: #15181f;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">
  <h2>Calculador de Precio Final</h2>

  <input id="codigo" placeholder="Código producto">
  <input id="nombre" placeholder="Nombre producto">
  <input id="costo_base" type="number" placeholder="Costo base">
  <input id="descuento" type="number" placeholder="Descuento %">
  <input id="iva" type="number" placeholder="IVA %">

  <button onclick="calcular()">Calcular</button>

  <div class="result" id="resultado"></div>
</div>

<script>

  const API_URL = "https://backend-calculador-8c3l.onrender.com";

  function calcular() {

    const codigo = document.getElementById("codigo").value.trim();
    const nombre = document.getElementById("nombre").value.trim();

    const costo_base = Number(document.getElementById("costo_base").value);
    const descuento = Number(document.getElementById("descuento").value);
    const iva = Number(document.getElementById("iva").value);

    const payload = {
      codigo,
      nombre,
      costo_base,
      descuento,
      iva
    };

    console.log("ENVIANDO:", payload);

    fetch(`${API_URL}/calcular/valorfinal`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    })
    .then(async (res) => {

      const data = await res.json();

      // ❌ ERROR (incluye 422, 404, etc.)
      if (!res.ok) {

        console.log("ERROR BACKEND:", data);

        document.getElementById("resultado").innerHTML = `
          <h3>❌ Error en los datos</h3>
          <p><b>Valor base:</b> 0</p>
          <p><b>Descuento:</b> 0%</p>
          <p><b>IVA:</b> 0%</p>
          <p><b>Detalle:</b> ${
            data.detail ? JSON.stringify(data.detail) : "Datos inválidos"
          }</p>
        `;

        return;
      }

      // ✅ ÉXITO (200)
      document.getElementById("resultado").innerHTML = `
        <h3>${data.titulo}</h3>
        <p><b>Valor base:</b> ${data.valor_base}</p>
        <p><b>Descuento:</b> ${data.descuento_aplicado}%</p>
        <p><b>IVA:</b> ${data.iva_aplicado}%</p>
        <h3><b>Total:</b> ${data.valor_final}</h3>
      `;
    })
    .catch(err => {

      console.error(err);

      document.getElementById("resultado").innerHTML = `
        <h3>❌ Error de conexión</h3>
        <p><b>Valor base:</b> 0</p>
        <p><b>Descuento:</b> 0%</p>
        <p><b>IVA:</b> 0%</p>
        <p><b>Total:</b> 0</p>
      `;
    });

  }

</script>

</body>
</html>
